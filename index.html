<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1d23">
<meta name="description" content="Website Launch-Checkliste — prüfen, abhaken, live gehen">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Website Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>

	:root {
		--bg: #1a1d23;
		--surface: #22262e;
		--surface-hover: #2a2f38;
		--border: #2e3340;
		--text: #e8e6e3;
		--text-muted: #8b8d94;
		--accent: #d4a55a;
		--accent-dim: rgba(212, 165, 90, 0.15);
		--green: #6abf69;
		--green-dim: rgba(106, 191, 105, 0.12);
		--red: #e06c6c;
		--font-display: 'DM Serif Display', Georgia, serif;
		--font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
		--radius: 10px;
	}

	* { box-sizing: border-box; margin: 0; padding: 0; }

	body {
		background: var(--bg);
		font-family: var(--font-body);
		color: var(--text);
		min-height: 100vh;
		min-height: 100dvh;
		-webkit-font-smoothing: antialiased;
		overscroll-behavior: none;
	}

	.header {
		padding: 28px 20px 20px;
		text-align: center;
		border-bottom: 1px solid var(--border);
		background: linear-gradient(180deg, rgba(212,165,90,0.06) 0%, transparent 100%);
		position: sticky;
		top: 0;
		z-index: 10;
		backdrop-filter: blur(12px);
		-webkit-backdrop-filter: blur(12px);
	}

	/* Safe area for notch devices */
	@supports (padding-top: env(safe-area-inset-top)) {
		.header { padding-top: calc(28px + env(safe-area-inset-top)); }
	}

	.header h1 {
		font-family: var(--font-display);
		font-size: 34px;
		font-weight: 400;
		letter-spacing: 0.5px;
		color: var(--accent);
		margin-bottom: 4px;
	}

	.header .subtitle {
		font-size: 15px;
		color: var(--text-muted);
		letter-spacing: 0.3px;
	}

	.progress-wrap {
		padding: 16px 20px;
		display: flex;
		align-items: center;
		gap: 12px;
		position: sticky;
		top: 78px;
		z-index: 9;
		background: var(--bg);
	}

	.progress-bar {
		flex: 1;
		height: 6px;
		background: var(--border);
		border-radius: 3px;
		overflow: hidden;
	}

	.progress-fill {
		height: 100%;
		background: var(--accent);
		border-radius: 3px;
		transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
	}

	.progress-text {
		font-size: 13px;
		font-weight: 500;
		color: var(--text-muted);
		white-space: nowrap;
		min-width: 52px;
		text-align: right;
	}

	.all-done {
		text-align: center;
		padding: 24px 20px 8px;
		font-size: 15px;
		color: var(--green);
		font-weight: 500;
	}

	.category {
		margin: 0 12px 8px;
		background: var(--surface);
		border-radius: var(--radius);
		border: 1px solid var(--border);
		overflow: hidden;
	}

	.cat-header {
		display: flex;
		align-items: center;
		padding: 14px 16px;
		cursor: pointer;
		user-select: none;
		-webkit-user-select: none;
		-webkit-tap-highlight-color: transparent;
		gap: 10px;
		transition: background 0.15s;
	}

	.cat-header:active { background: var(--surface-hover); }

.cat-title {
		flex: 1;
		font-size: 15px;
		font-weight: 600;
		letter-spacing: 0.2px;
	}

	.cat-badge {
		font-size: 11px;
		font-weight: 500;
		padding: 2px 8px;
		border-radius: 10px;
		background: var(--accent-dim);
		color: var(--accent);
		transition: all 0.2s;
	}

	.cat-badge.done {
		background: var(--green-dim);
		color: var(--green);
	}

	.cat-chevron {
		color: var(--text-muted);
		font-size: 12px;
		transition: transform 0.2s;
	}

	.cat-chevron.open { transform: rotate(90deg); }

	.cat-body { display: none; }
	.cat-body.open { display: block; }

	.item-list { padding: 0 8px 4px; }

	.item {
		display: flex;
		align-items: center;
		padding: 10px 12px;
		gap: 12px;
		border-radius: 8px;
		cursor: pointer;
		user-select: none;
		-webkit-user-select: none;
		-webkit-tap-highlight-color: transparent;
		transition: background 0.12s;
	}

	.item:active { background: var(--surface-hover); }

	.checkbox {
		width: 22px;
		height: 22px;
		border-radius: 6px;
		border: 2px solid var(--border);
		display: flex;
		align-items: center;
		justify-content: center;
		flex-shrink: 0;
		transition: all 0.2s;
	}

	.checkbox.checked {
		background: var(--green);
		border-color: var(--green);
	}

	.checkbox svg { display: none; }
	.checkbox.checked svg { display: block; }

	.item-text {
		flex: 1;
		font-size: 14px;
		line-height: 1.4;
		transition: opacity 0.2s;
	}

	.item-text.done {
		opacity: 0.4;
		text-decoration: line-through;
		text-decoration-color: var(--text-muted);
	}

	.item-delete {
		opacity: 0;
		color: var(--red);
		font-size: 20px;
		padding: 0 4px;
		cursor: pointer;
		background: none;
		border: none;
		line-height: 1;
		transition: opacity 0.15s;
	}

	@media (hover: hover) {
		.cat-header:hover { background: var(--surface-hover); }
		.item:hover { background: var(--surface-hover); }
		.item:hover .item-delete { opacity: 0.6; }
		.item-delete:hover { opacity: 1 !important; }
	}

	@media (pointer: coarse) {
		.item-delete { opacity: 0.35; }
	}

	.add-row {
		display: flex;
		align-items: center;
		padding: 4px 12px 10px;
		gap: 8px;
	}

	.add-btn {
		font-size: 13px;
		color: var(--accent);
		background: none;
		border: none;
		cursor: pointer;
		padding: 6px 4px;
		font-family: var(--font-body);
		opacity: 0.7;
		transition: opacity 0.15s;
		-webkit-tap-highlight-color: transparent;
	}

	.add-btn:hover { opacity: 1; }

	.add-input {
		flex: 1;
		background: var(--bg);
		border: 1px solid var(--border);
		border-radius: 6px;
		padding: 8px 10px;
		font-size: 14px;
		color: var(--text);
		font-family: var(--font-body);
		outline: none;
	}

	.add-input:focus { border-color: var(--accent); }

	.add-confirm {
		background: var(--accent);
		color: var(--bg);
		border: none;
		border-radius: 6px;
		padding: 8px 14px;
		font-size: 15px;
		font-weight: 600;
		cursor: pointer;
		font-family: var(--font-body);
	}

	.footer {
		padding: 20px;
		display: flex;
		justify-content: center;
		gap: 12px;
		flex-wrap: wrap;
	}

	@supports (padding-bottom: env(safe-area-inset-bottom)) {
		.footer { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
	}

	.footer-btn {
		background: none;
		border: 1px solid var(--border);
		color: var(--text-muted);
		padding: 10px 20px;
		border-radius: 8px;
		font-size: 13px;
		cursor: pointer;
		font-family: var(--font-body);
		transition: all 0.15s;
		-webkit-tap-highlight-color: transparent;
	}

	.footer-btn:hover,
	.footer-btn:active {
		border-color: var(--accent);
		color: var(--accent);
	}

	.footer-btn.danger:hover,
	.footer-btn.danger:active {
		border-color: var(--red);
		color: var(--red);
	}

	.install-banner {
		display: none;
		margin: 12px;
		padding: 14px 16px;
		background: var(--accent-dim);
		border: 1px solid rgba(212, 165, 90, 0.3);
		border-radius: var(--radius);
		font-size: 13px;
		color: var(--accent);
		text-align: center;
		line-height: 1.5;
	}

	.trip-selector {
		display: flex;
		gap: 8px;
		padding: 12px 12px 4px;
	}

	.trip-btn {
		flex: 1;
		padding: 8px 4px;
		border-radius: 8px;
		border: 1px solid var(--border);
		background: var(--surface);
		color: var(--text-muted);
		font-family: var(--font-body);
		font-size: 12px;
		font-weight: 500;
		cursor: pointer;
		text-align: center;
		transition: all 0.15s;
		-webkit-tap-highlight-color: transparent;
		white-space: nowrap;
	}

	.trip-btn.active {
		background: var(--accent-dim);
		border-color: var(--accent);
		color: var(--accent);
		font-weight: 600;
	}

</style>
</head>
<body>

<div class="header">
	<h1>Website Checklist</h1>
	<div class="subtitle">Prüfen, abhaken, live gehen</div>
</div><!-- end /.header -->

<div id="installBanner" class="install-banner">
	Tipp: Teilen → „Zum Home-Bildschirm" für App-Feeling + sichere Datenspeicherung
</div>

<div class="trip-selector" id="tripSelector"></div>

<div class="progress-wrap">
	<div class="progress-bar">
		<div class="progress-fill" id="progressFill"></div>
	</div>
	<div class="progress-text" id="progressText">0 / 0</div>
</div>

<div id="allDone" class="all-done" style="display:none">✅ Alles gecheckt — viel Erfolg beim Launch!</div>

<div id="categoryList"></div>

<div class="footer">
	<button class="footer-btn danger" id="resetBtn">Haken zurücksetzen</button>
	<button class="footer-btn" id="resetAllBtn">Alles zurücksetzen</button>
</div><!-- end /.footer -->

<script>

	// Service Worker registration
	if ( 'serviceWorker' in navigator ) {

		navigator.serviceWorker.register( './sw.js' ).catch( ( err ) => {
			console.log( 'SW registration failed:', err );
		});

	}

	// Show install hint on iOS Safari (not in standalone mode)
	if (
		( 'standalone' in navigator && ! navigator.standalone ) &&
		/iPhone|iPad/.test( navigator.userAgent )
	) {

		document.getElementById( 'installBanner' ).style.display = 'block';

	}

	const STORAGE_KEY = 'website-checklist';

	const TRIP_TYPES = [
		{ id: 'quick',   label: 'Quick-Check', level: 0 },
		{ id: 'launch',  label: 'Launch',       level: 1 },
		{ id: 'relaunch', label: 'Relaunch',    level: 2 },
		{ id: 'seo',     label: 'SEO-Audit',    level: 3 },
	];

	const DEFAULT_CATEGORIES = [
		{
			id: 'deploy', icon: '🚀', title: 'Deployment & Technik',
			items: [
				{ id: 'd1', text: 'Domain korrekt auf Hosting eingestellt (DNS-Propagation abwarten)', minTrip: 0 },
				{ id: 'd2', text: 'SSL-Zertifikat aktiv und HTTPS erzwungen', minTrip: 0 },
				{ id: 'd3', text: 'www vs. non-www konsistent gewählt und weitergeleitet', minTrip: 0 },
				{ id: 'd4', text: 'PHP-Fehlerausgabe in der Produktion deaktiviert (display_errors = Off)', minTrip: 0 },
				{ id: 'd5', text: 'WP_DEBUG auf false gesetzt', minTrip: 0 },
				{ id: 'd6', text: 'WP_LOCAL_DEV entfernt oder auf false gesetzt', minTrip: 0 },
				{ id: 'd7', text: 'PHP-Version auf empfohlene Version gestellt (8.2+)', minTrip: 1 },
				{ id: 'd8', text: 'WordPress-Adresse und Website-Adresse korrekt gesetzt (Einstellungen → Allgemein)', minTrip: 1 },
				{ id: 'd9', text: 'WordPress, Themes und Plugins aktuell', minTrip: 1 },
				{ id: 'd10', text: 'Automatische Updates konfiguriert (Sicherheitsupdates mindestens)', minTrip: 1 },
				{ id: 'd11', text: 'Login-URL angepasst (z.B. WPS Hide Login)', minTrip: 2 },
			],
		},
		{
			id: 'security', icon: '🔒', title: 'Sicherheit',
			items: [
				{ id: 's1', text: 'Standard-Admin-Benutzername „admin" umbenannt oder gelöscht', minTrip: 0 },
				{ id: 's2', text: 'Starkes Administrator-Passwort gesetzt', minTrip: 0 },
				{ id: 's3', text: 'wp-config.php: Sicherheitskeys erneuert (api.wordpress.org/secret-key/1.1/salt/)', minTrip: 0 },
				{ id: 's4', text: 'Datei-Editor im Backend deaktiviert (DISALLOW_FILE_EDIT)', minTrip: 0 },
				{ id: 's5', text: 'Verzeichnis-Listing via .htaccess deaktiviert (Options -Indexes)', minTrip: 0 },
				{ id: 's6', text: 'Wordfence oder ähnliche WAF aktiv und konfiguriert', minTrip: 1 },
				{ id: 's7', text: 'Login-Versuche begrenzt (via Plugin oder .htaccess)', minTrip: 1 },
				{ id: 's8', text: 'XML-RPC deaktiviert wenn nicht benötigt', minTrip: 1 },
				{ id: 's9', text: 'Datenbankpräfix geändert (nicht wp_)', minTrip: 2 },
				{ id: 's10', text: 'wp-login.php: Zugriff auf eigene IP beschränkt (optional)', minTrip: 2 },
				{ id: 's11', text: 'WP-REST-API: öffentliche Endpunkte eingeschränkt (falls nicht benötigt)', minTrip: 2 },
			],
		},
		{
			id: 'performance', icon: '⚡', title: 'Performance',
			items: [
				{ id: 'p1', text: 'Caching-Plugin aktiv (LiteSpeed Cache, WP Super Cache o.ä.)', minTrip: 1 },
				{ id: 'p2', text: 'Bilder optimiert und in modernem Format (WebP)', minTrip: 1 },
				{ id: 'p3', text: 'Lazy Loading für Bilder aktiv', minTrip: 1 },
				{ id: 'p4', text: 'CSS und JS minifiziert', minTrip: 1 },
				{ id: 'p5', text: 'GZIP/Brotli-Komprimierung aktiv (Serverebene oder Plugin)', minTrip: 1 },
				{ id: 'p6', text: 'Google PageSpeed Insights / Core Web Vitals geprüft', minTrip: 1 },
				{ id: 'p7', text: 'Keine ungenutzten Plugins oder Themes installiert', minTrip: 1 },
				{ id: 'p8', text: 'Datenbank bereinigt (Revisionen, Drafts, Spam)', minTrip: 2 },
			],
		},
		{
			id: 'seo', icon: '📈', title: 'SEO & Meta',
			items: [
				{ id: 'seo1', text: 'Suchmaschinen-Indizierung in Einstellungen → Lesen freigegeben', minTrip: 0 },
				{ id: 'seo2', text: 'robots.txt korrekt konfiguriert (WordPress nicht blockiert)', minTrip: 1 },
				{ id: 'seo3', text: 'Sitemap.xml aktiv und bei Google Search Console eingereicht', minTrip: 1 },
				{ id: 'seo4', text: 'SEO-Plugin konfiguriert (Yoast SEO, RankMath o.ä.)', minTrip: 1 },
				{ id: 'seo5', text: 'Meta-Titel und Meta-Description für alle wichtigen Seiten gesetzt', minTrip: 1 },
				{ id: 'seo6', text: 'Open Graph / Social Media Tags konfiguriert', minTrip: 1 },
				{ id: 'seo7', text: 'Favicons korrekt eingebunden (SVG, ICO, Apple Touch Icon 180×180)', minTrip: 1 },
				{ id: 'seo8', text: '301-Weiterleitungen für alte URLs eingerichtet (falls Relaunch)', minTrip: 2 },
				{ id: 'seo9', text: 'Canonical URLs korrekt gesetzt', minTrip: 3 },
				{ id: 'seo10', text: 'Hreflang-Tags korrekt gesetzt (bei Mehrsprachigkeit)', minTrip: 3 },
			],
		},
		{
			id: 'tracking', icon: '📊', title: 'Tracking & Analytics',
			items: [
				{ id: 'tr1', text: 'Google Analytics oder Matomo aktiv', minTrip: 1 },
				{ id: 'tr2', text: 'Google Search Console verknüpft und verifiziert', minTrip: 1 },
				{ id: 'tr3', text: 'Conversion-Tracking konfiguriert (Kontaktformular, WooCommerce o.ä.)', minTrip: 3 },
				{ id: 'tr4', text: 'Tag Manager korrekt implementiert (falls verwendet)', minTrip: 3 },
			],
		},
		{
			id: 'media', icon: '🖼️', title: 'Medien & Assets',
			items: [
				{ id: 'me1', text: 'Bilder: Urheberrecht und Alt-Texte geprüft', minTrip: 1 },
				{ id: 'me2', text: 'Alle Bilder haben sinnvolle Dateinamen (kein IMG_1234.jpg)', minTrip: 2 },
				{ id: 'me3', text: 'PDF-Downloads korrekt verlinkt und aktuell', minTrip: 2 },
			],
		},
		{
			id: 'links', icon: '🔗', title: 'Links & Redirects',
			items: [
				{ id: 'li1', text: 'Alle internen Links funktionsfähig (Broken Link Checker)', minTrip: 1 },
				{ id: 'li2', text: '404-Seite vorhanden und gestaltet', minTrip: 1 },
				{ id: 'li3', text: '301-Weiterleitungen für alte URLs geprüft (falls Relaunch)', minTrip: 2 },
				{ id: 'li4', text: 'Externe Links auf Aktualität geprüft', minTrip: 2 },
			],
		},
		{
			id: 'ux', icon: '📱', title: 'Mobile & UX',
			items: [
				{ id: 'ux1', text: 'Viewport-Meta-Tag korrekt gesetzt', minTrip: 0 },
				{ id: 'ux2', text: 'Responsives Layout auf iPhone + Android getestet', minTrip: 1 },
				{ id: 'ux3', text: 'Navigation auf Mobile funktionsfähig', minTrip: 1 },
				{ id: 'ux4', text: 'Touch-Targets ausreichend groß (min. 44×44px)', minTrip: 2 },
				{ id: 'ux5', text: 'Schriftgrößen auf Mobile lesbar (min. 16px Body)', minTrip: 2 },
			],
		},
		{
			id: 'content', icon: '✍️', title: 'Content & Texte',
			items: [
				{ id: 'co1', text: 'Impressum vorhanden und korrekt (DSGVO)', minTrip: 0 },
				{ id: 'co2', text: 'Datenschutzerklärung aktuell und vollständig', minTrip: 0 },
				{ id: 'co3', text: 'Cookie-Consent-Banner aktiv (falls Analytics/Tracking)', minTrip: 0 },
				{ id: 'co4', text: 'Alle Platzhalter-Inhalte (Lorem ipsum) entfernt', minTrip: 1 },
				{ id: 'co5', text: 'Kontaktformular: Bestätigungs-E-Mail und Empfänger geprüft', minTrip: 1 },
				{ id: 'co6', text: 'Kommentarfunktion konfiguriert (Spam-Schutz via Antispam Bee o.ä.)', minTrip: 1 },
				{ id: 'co7', text: 'Standard-Pingback/Trackbacks deaktiviert', minTrip: 1 },
			],
		},
		{
			id: 'backup', icon: '💾', title: 'Backup & Monitoring',
			items: [
				{ id: 'ba1', text: 'Automatisches Backup eingerichtet (UpdraftPlus, BackWPup o.ä.)', minTrip: 0 },
				{ id: 'ba2', text: 'Backup-Ziel außerhalb des Servers (Google Drive, S3)', minTrip: 0 },
				{ id: 'ba3', text: 'Erstes manuelles Backup direkt nach Launch gemacht', minTrip: 0 },
				{ id: 'ba4', text: 'E-Mail-Versand vom Server getestet (kein Spam-Ordner)', minTrip: 1 },
				{ id: 'ba5', text: 'WP-Mail: SMTP-Plugin konfiguriert (kein PHP mail())', minTrip: 1 },
				{ id: 'ba6', text: 'Uptime-Monitoring eingerichtet (UptimeRobot o.ä.)', minTrip: 1 },
			],
		},
	];

	// State
	let state = {
		categories: JSON.parse( JSON.stringify( DEFAULT_CATEGORIES ) ),
		checked: {},
		expanded: {},
		tripLevel: 0,
	};

	function mergeWithDefaults( savedCategories ) {

		// Build lookup of default items by id
		const defaultItemMap = {};

		DEFAULT_CATEGORIES.forEach( cat => {
			cat.items.forEach( item => {
				defaultItemMap[item.id] = item;
			});
		});

		// Track which ids exist in saved state
		const savedItemIds = {};

		savedCategories.forEach( cat => {
			cat.items.forEach( item => {

				savedItemIds[item.id] = true;

				// Copy minTrip from default if missing
				if ( item.minTrip === undefined && defaultItemMap[item.id] && defaultItemMap[item.id].minTrip !== undefined ) {
					item.minTrip = defaultItemMap[item.id].minTrip;
				}

			});
		});

		// Add new default items not yet in saved state
		DEFAULT_CATEGORIES.forEach( defaultCat => {

			const savedCat = savedCategories.find( c => c.id === defaultCat.id );

			if ( ! savedCat ) return;

			defaultCat.items.forEach( defaultItem => {

				if ( ! savedItemIds[defaultItem.id] ) {
					savedCat.items.push( JSON.parse( JSON.stringify( defaultItem ) ) );
				}

			});

		});

		return savedCategories;

	}

	function loadState() {

		try {

			const raw = localStorage.getItem( STORAGE_KEY );

			if ( raw ) {

				const data = JSON.parse( raw );
				if ( data.categories ) state.categories = mergeWithDefaults( data.categories );
				if ( data.checked ) state.checked = data.checked;
				if ( data.expanded ) state.expanded = data.expanded;
				if ( typeof data.tripLevel === 'number' ) state.tripLevel = data.tripLevel;

			} else {

				state.categories.forEach( c => state.expanded[c.id] = true );

			}

		} catch ( e ) {

			state.categories.forEach( c => state.expanded[c.id] = true );

		}

	}

	function saveState() {

		try {

			localStorage.setItem( STORAGE_KEY, JSON.stringify( {
				categories: state.categories,
				checked: state.checked,
				expanded: state.expanded,
				tripLevel: state.tripLevel,
			}));

		} catch ( e ) {
			console.error( 'Save failed:', e );
		}

	}

	function visibleItems( cat ) {
		return cat.items.filter( item => ( item.minTrip || 0 ) <= state.tripLevel );
	}

	function updateProgress() {

		let total = 0;
		let done = 0;

		state.categories.forEach( cat => {

			visibleItems( cat ).forEach( item => {

				total++;
				if ( state.checked[item.id] ) done++;

			});

		});

		const pct = total > 0 ? ( done / total ) * 100 : 0;

		document.getElementById( 'progressFill' ).style.width = pct + '%';
		document.getElementById( 'progressText' ).textContent = done + ' / ' + total;
		document.getElementById( 'allDone' ).style.display = pct === 100 ? 'block' : 'none';

	}

	function renderTripSelector() {

		const container = document.getElementById( 'tripSelector' );
		container.innerHTML = '';

		TRIP_TYPES.forEach( trip => {

			const btn = document.createElement( 'button' );
			btn.className = 'trip-btn' + ( trip.level === state.tripLevel ? ' active' : '' );
			btn.textContent = trip.label;

			btn.addEventListener( 'click', () => {

				state.tripLevel = trip.level;
				saveState();
				renderTripSelector();
				render();

			});

			container.appendChild( btn );

		});

	}

	function render() {

		const container = document.getElementById( 'categoryList' );
		container.innerHTML = '';

		state.categories.forEach( cat => {

			const items = visibleItems( cat );
			const catChecked = items.filter( i => state.checked[i.id] ).length;
			const catDone = catChecked === items.length && items.length > 0;
			const isOpen = state.expanded[cat.id];

			const catEl = document.createElement( 'div' );
			catEl.className = 'category';

			const header = document.createElement( 'div' );
			header.className = 'cat-header';
			header.innerHTML = `
				<span class="cat-title">${cat.title}</span>
				<span class="cat-badge${catDone ? ' done' : ''}">${catChecked}/${items.length}</span>
				<span class="cat-chevron${isOpen ? ' open' : ''}">▶</span>
			`;

			header.addEventListener( 'click', () => {

				state.expanded[cat.id] = ! state.expanded[cat.id];
				saveState();
				render();

			});

			catEl.appendChild( header );

			const body = document.createElement( 'div' );
			body.className = 'cat-body' + ( isOpen ? ' open' : '' );

			const list = document.createElement( 'div' );
			list.className = 'item-list';

			items.forEach( item => {

				const row = document.createElement( 'div' );
				row.className = 'item';

				const isChecked = state.checked[item.id];

				row.innerHTML = `
					<div class="checkbox${isChecked ? ' checked' : ''}">
						<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
							<path d="M3 7.5L5.5 10L11 4" stroke="#1a1d23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
						</svg>
					</div>
					<span class="item-text${isChecked ? ' done' : ''}">${item.text}</span>
					<button class="item-delete" aria-label="Löschen">×</button>
				`;

				row.addEventListener( 'click', ( e ) => {

					if ( e.target.closest( '.item-delete' ) ) return;
					state.checked[item.id] = ! state.checked[item.id];
					saveState();
					render();

				});

				row.querySelector( '.item-delete' ).addEventListener( 'click', ( e ) => {

					e.stopPropagation();
					cat.items = cat.items.filter( i => i.id !== item.id );
					delete state.checked[item.id];
					saveState();
					render();

				});

				list.appendChild( row );

			});

			body.appendChild( list );

			// Add item row
			const addRow = document.createElement( 'div' );
			addRow.className = 'add-row';

			const addBtn = document.createElement( 'button' );
			addBtn.className = 'add-btn';
			addBtn.textContent = '+ Hinzufügen';

			addBtn.addEventListener( 'click', () => {

				addRow.innerHTML = '';

				const input = document.createElement( 'input' );
				input.className = 'add-input';
				input.type = 'text';
				input.placeholder = 'Neuer Eintrag...';

				const confirm = document.createElement( 'button' );
				confirm.className = 'add-confirm';
				confirm.textContent = '+';

				const doAdd = () => {

					const val = input.value.trim();

					if ( val ) {

						cat.items.push( { id: 'custom-' + Date.now(), text: val } );
						saveState();
						render();

					}

				};

				input.addEventListener( 'keydown', ( e ) => {

					if ( e.key === 'Enter' ) doAdd();

				});

				confirm.addEventListener( 'click', doAdd );

				addRow.appendChild( input );
				addRow.appendChild( confirm );

				setTimeout( () => input.focus(), 50 );

			});

			addRow.appendChild( addBtn );
			body.appendChild( addRow );

			catEl.appendChild( body );
			container.appendChild( catEl );

		});

		updateProgress();

	}

	// Reset checks only
	document.getElementById( 'resetBtn' ).addEventListener( 'click', () => {

		if ( ! confirm( 'Alle Haken zurücksetzen?' ) ) return;

		state.checked = {};
		state.categories.forEach( c => state.expanded[c.id] = true );
		saveState();
		render();

	});

	// Full reset including custom items
	document.getElementById( 'resetAllBtn' ).addEventListener( 'click', () => {

		if ( ! confirm( 'Komplett zurücksetzen? Eigene Einträge gehen verloren.' ) ) return;

		state.categories = JSON.parse( JSON.stringify( DEFAULT_CATEGORIES ) );
		state.checked = {};
		state.categories.forEach( c => state.expanded[c.id] = true );
		saveState();
		render();

	});

	// Init
	loadState();
	renderTripSelector();
	render();

</script>

</body>
</html>
